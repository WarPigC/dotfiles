general{
    hide_cursor= true
    ignore_empty_input= true
}


background {
	monitor = 
	path = screenshot
	blur_passes = 3
}

input-field {
    monitor =
    size = 20%, 5%
    outline_thickness = 3
    inner_color = rgba(213, 125, 219, 0.5)

	placeholder_text = Password?
	fail_text = Try Again.

	outer_color = rgba(E5383Baa) rgba(80797aaa) 200deg
    check_color= rgba(ff6633ee) 
    fail_color=rgba(ff6633ee) rgba(ff0066ee) 40deg


    font_color = rgb(254, 254, 254)
    fade_on_empty = false
    rounding = 15

    position = 0, -20
    halign = center
    valign = center
}

