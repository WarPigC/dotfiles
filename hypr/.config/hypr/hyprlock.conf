# time label
label {
    monitor =
	text = cmd[update:1000] echo $TIME12
    font_size = 60
    font_family = $font

    position = 20, -10
    halign = left 
    valign = top
}

# day label
label{
	monitor = 
	text = cmd[update:1000] echo $(date '+%d %B')
	text_align = center
	position = -20, -10
	halign = right
	valign = top
	font_size = 32
}

# year label
label {
	monitor = 
	text = cmd[update:1000] echo $(date '+%Y')
	position = -20, -45
	halign = right
	valign = top
	font_size = 70
	
}
